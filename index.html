<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlen-Ratespiel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <h1>Zahlen-Ratespiel</h1>
        <p>Ich suche eine Zahl zwischen 1 und 100. Errätst du sie?</p>

        <div class="input-container">
            <input type="number" id="guessInput" placeholder="Deine Zahl...">
            <button id="guessButton">Raten</button>
            <button id="againButton">Nochmal</button>
        </div>

        <p id="message"></p>
    </div>

    <footer>
        Made with ❤️ | Zahlen-Ratespiel v<span id="app-version">Lade...</span>
        <a href="https://www.github.com/hng-dev" target="_blank" rel="noopener noreferrer">hng-dev</a>
    </footer>

    <script src="script.js"></script>
</body>

</html>
